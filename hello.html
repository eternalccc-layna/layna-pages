<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layna 的第一个网站 🎉</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
  }
  .card {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 24px;
    padding: 64px 80px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
  }
  h1 { font-size: 48px; margin: 0 0 16px; letter-spacing: -1px; }
  p { font-size: 18px; opacity: 0.9; margin: 8px 0; }
  .badge {
    display: inline-block;
    margin-top: 24px;
    padding: 8px 20px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>🎉 Hello Layna!</h1>
    <p>你的第一个静态网站已经上线</p>
    <p>由 Cloudflare Pages 全球 CDN 托管</p>
    <div class="badge">Powered by html-deploy skill</div>
  </div>
</body>
</html>
